services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://brand_technology:brand_technology@database:5432/brand_technology?schema=public
      JWT_SECRET: change-me
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: brand_technology
      POSTGRES_USER: brand_technology
      POSTGRES_PASSWORD: brand_technology
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brand_technology -d brand_technology"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  uploads_data:
